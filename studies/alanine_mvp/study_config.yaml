# =============================================================================
# Alanine sensitivity study — configuration
# =============================================================================
# THIS FILE IS THE ONLY THING YOU EDIT TO RUN A STUDY.
# It is declarative: change values, save, then run the notebook (Run All) or the
# CLI (`python scripts/run_sensitivity_study.py --config <this file>`).
#
# You do NOT need to edit any Python. Indentation matters in YAML (2 spaces, no
# tabs). Lines starting with '#' are comments. Run with `--dry-run` first to see
# the case counts and estimated runtime before launching the full study.
# =============================================================================

study:
  study_id: alanine_mvp
  description: "Alanine sensitivity MVP — Titan amino-acid accessibility landscapes"
  # All outputs for this study are written under this folder (created if missing).
  output_dir: studies/alanine_mvp

mode:
  type: single_product_sensitivity
  # The product whose accessibility we are mapping. Keep this a list (the engine
  # supports several) but the MVP uses exactly one.
  target_products:
    - Alanine(aq)
  # MVP is single-product: the target never competes against other candidate
  # products. Leave false unless you deliberately want product-vs-product runs.
  competitive_products: false

# -----------------------------------------------------------------------------
# Input data files (paths are relative to the repo root). The bundled files below
# already include Alanine(aq) (formula C3H7NO2) plus its reactants/solvent, so this
# study runs as-is. For your own target, add: a species CSV row (cantera_name,
# formula, state, molar volume, role=product) and a wide G(T) column in the Gibbs
# seed CSV (temperature in Kelvin in the first column).
species_files:
  species_csv: inputs/species_example.csv
  # Committed with the study so it reproduces from a clean clone. Byte-identical
  # to the seed recorded in run_provenance.json (gibbs_seed_sha256).
  gibbs_seed_wide_csv: studies/alanine_mvp/inputs/gibbs_seed_wide.csv

# -----------------------------------------------------------------------------
# Base physical conditions (held constant unless a sweep overrides them).
# -----------------------------------------------------------------------------
base_conditions:
  temperature_C: 0          # equilibrium temperature
  pressure_Pa: 101325        # ~1 bar; matches the existing workflow
  phase_name: aqueous
  solver: vcs
  max_steps: 100000

# -----------------------------------------------------------------------------
# Phase membership — WHICH species exist in the Cantera model.
# -----------------------------------------------------------------------------
# This is the explicit "is the species in the system at all" control, and it is
# SEPARATE from initial amounts:
#   * A species listed here with initial moles 0 is PRESENT-BUT-ZERO: it starts
#     absent but is allowed to form (e.g. NH3=0 means "no initial NH3, but NH3
#     may still form from HCN-derived nitrogen").
#   * A species NOT listed here is FULLY EXCLUDED from the system.
# To study "with vs without NH3", make two studies/substudies with different
# allowed_species lists. The target variant(s) are added automatically.
model:
  allowed_species:
    - H2O(l)
    - HCN(aq)
    - C2H2(aq)
    - NH3(aq)

# -----------------------------------------------------------------------------
# Reporting thresholds and quality gate.
# -----------------------------------------------------------------------------
thresholds:
  formation_X_threshold: 1.0e-12     # X_eq >= this -> at least "trace"
  significant_X_threshold: 1.0e-6    # X_eq >= this -> "significant"
  formation_n_threshold_mol: 0.0     # optional minimum reconstructed moles
  balance_tol: 1.0e-6                # element-balance spread above this -> flagged "suspect_balance"

# -----------------------------------------------------------------------------
# Inventory that stays fixed unless a specific sweep overrides it.
# Values are initial moles. H2O is the solvent basis (keep at 1.0).
# -----------------------------------------------------------------------------
fixed_inventory:
  H2O(l): 1.0
  HCN(aq): 0.020

# -----------------------------------------------------------------------------
# Sweeps. Enable only the substudies you want. Run counts depend on each axis's
# `points:` value and are NOT hardcoded here. To see the live counts, run:
#   python scripts/generate_sensitivity_design.py --config <this file> --dry-run
# Sweep variable types: linear (min/max/points), logspace (min/max/points),
# or explicit (values: [...]).
# -----------------------------------------------------------------------------
sweeps:

  # (1) Where does alanine become accessible as a function of NH3 and C2H2/HCN?
  inventory_landscape:
    enabled: true
    variables:
      NH3(aq):
        type: linear
        min: 0.0
        max: 0.15
        points: 25
      C2H2_over_HCN:        # C2H2 is set to (ratio * HCN); HCN is fixed below
        type: linear
        min: 0.0
        max: 5.0
        points: 25
    # HCN and H2O held fixed; no Gibbs offset in this substudy.

  # (2) How sensitive is alanine accessibility to uncertainty in its Gibbs energy?
  #     Applied as an exact constant offset to the standard-state Gibbs energy
  #     (a7 coefficient shift, dG/R), inventory held fixed.
  deltaG_sweep:
    enabled: true
    species: Alanine(aq)
    offsets_kJ_mol:
      type: linear
      min: -200
      max: 200
      points: 11
    fixed_inventory:
      H2O(l): 1.0
      HCN(aq): 0.020
      C2H2(aq): 0.042
      NH3(aq): 0.05

  # (3) Does energetic uncertainty shift the NH3 threshold for alanine accessibility?
  nh3_deltaG_landscape:
    enabled: true
    variables:
      NH3(aq):
        type: linear
        min: 0.0
        max: 0.15
        points: 25
      deltaG_offset_kJ_mol:
        type: linear
        min: -200
        max: 200
        points: 11
    fixed_inventory:
      H2O(l): 1.0
      HCN(aq): 0.020
      C2H2(aq): 0.042

# -----------------------------------------------------------------------------
# What to save. The core result tables (raw long, moles long, case summary,
# landscape grid) are ALWAYS written — they are tidy (one row per case) with all
# design variables retained, ready for downstream ML use. The toggles below control
# the optional extras.
# -----------------------------------------------------------------------------
outputs:
  write_schema_dictionary: true     # emit results/SCHEMA.md describing every column
  write_provenance: true            # emit run_provenance.json (versions, hashes, timestamp)
  make_plots: true                  # generate figures (set false to skip plotting)

# -----------------------------------------------------------------------------
# Plot styling. Every key is optional; sensible defaults are used if omitted.
# Edit titles/labels/colors here instead of touching any Python.
# -----------------------------------------------------------------------------
plots:
  formats: [png, pdf]
  dpi: 600
  inventory_landscape:
    title: "Alanine accessibility — NH3 vs C2H2/HCN (0 C)"
    x_label: "NH3 (mol)"
    y_label: "C2H2 / HCN"
    colorbar_label: "log10 equilibrium mole fraction of alanine"
    cmap: viridis
    vmin: -12          # leave commented/omit for auto-scaling
    vmax: 0
    threshold_contour_log10X: -12
    show_failed_as: gray
  deltaG_sweep:
    title: "Alanine accessibility vs Gibbs offset (fixed inventory)"
    x_label: "Delta G offset (kJ/mol)"
    y_label: "log10 equilibrium mole fraction of alanine"
    threshold_line_log10X: -12
    shade_window_kJ: 20
  nh3_deltaG_landscape:
    title: "NH3 threshold vs Gibbs offset for alanine"
    x_label: "NH3 (mol)"
    y_label: "Delta G offset (kJ/mol)"
    colorbar_label: "log10 equilibrium mole fraction of alanine"
    cmap: viridis
    threshold_contour_log10X: -12
    show_failed_as: gray
