# Auto-generated by scripts/new_amino_acid_batch.py — edit the template (studies/alanine_mvp) or regenerate.
study:
  study_id: lysine
  description: "Lysine sensitivity \u2014 Titan amino-acid accessibility landscape\
    \ (breadth campaign)"
  output_dir: studies/aa_no_nh3/lysine
mode:
  type: single_product_sensitivity
  target_products:
  - Lysine(aq)
  competitive_products: false
species_files:
  species_csv: inputs/amino_acids_species.csv
  gibbs_seed_wide_csv: inputs/amino_acids_gibbs_seed.csv
base_conditions:
  temperature_C: 0
  pressure_Pa: 101325
  phase_name: aqueous
  solver: vcs
  max_steps: 100000
model:
  allowed_species:
  - H2O(l)
  - HCN(aq)
  - C2H2(aq)
thresholds:
  formation_X_threshold: 1.0e-12
  significant_X_threshold: 1.0e-06
  formation_n_threshold_mol: 0.0
  balance_tol: 1.0e-06
fixed_inventory:
  H2O(l): 1.0
  HCN(aq): 0.02
sweeps:
  inventory_landscape:
    enabled: true
    variables:
      C2H2_over_HCN:
        type: linear
        min: 0.0
        max: 5.0
        points: 25
  deltaG_sweep:
    enabled: true
    species: Lysine(aq)
    offsets_kJ_mol:
      type: linear
      min: -200
      max: 200
      points: 11
    fixed_inventory:
      H2O(l): 1.0
      HCN(aq): 0.02
      C2H2(aq): 0.042
  nh3_deltaG_landscape:
    enabled: false
    variables:
      deltaG_offset_kJ_mol:
        type: linear
        min: -200
        max: 200
        points: 11
    fixed_inventory:
      H2O(l): 1.0
      HCN(aq): 0.02
      C2H2(aq): 0.042
outputs:
  write_schema_dictionary: true
  write_provenance: true
  make_plots: true
plots:
  formats:
  - png
  - pdf
  dpi: 600
  inventory_landscape:
    title: "Lysine accessibility \u2014 NH3 vs C2H2/HCN (0 C)"
    x_label: NH3 (mol)
    y_label: C2H2 / HCN
    colorbar_label: log10 equilibrium mole fraction of lysine
    cmap: viridis
    vmin: -12
    vmax: 0
    threshold_contour_log10X: -12
    show_failed_as: gray
  deltaG_sweep:
    title: Lysine accessibility vs Gibbs offset (fixed inventory)
    x_label: Delta G offset (kJ/mol)
    y_label: log10 equilibrium mole fraction of lysine
    threshold_line_log10X: -12
    shade_window_kJ: 20
  nh3_deltaG_landscape:
    title: NH3 threshold vs Gibbs offset for lysine
    x_label: NH3 (mol)
    y_label: Delta G offset (kJ/mol)
    colorbar_label: log10 equilibrium mole fraction of lysine
    cmap: viridis
    threshold_contour_log10X: -12
    show_failed_as: gray
